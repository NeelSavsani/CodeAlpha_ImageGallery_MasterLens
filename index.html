<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/e05d24f6c7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="gallery">
      <img src="assets/img1.jpg" onclick="openImage(this)" />
      <img src="assets/img2.jpg" onclick="openImage(this)" />
      <img src="assets/img3.jpg" onclick="openImage(this)" />
      <img src="assets/img4.jpg" onclick="openImage(this)" />
    </div>

    <!-- FULLSCREEN PREVIEW -->
    <div id="preview">
      <span class="close" onclick="closeImage()">
        <i class="fa-solid fa-xmark"></i>
      </span>

      <span class="nav left" onclick="prevImage()">
        <i class="fa-solid fa-chevron-left"></i>
      </span>

      <!-- NEW CONTAINER -->
      <div class="image-container">
        <img id="preview-img" />
      </div>

      <span class="nav right" onclick="nextImage()">
        <i class="fa-solid fa-chevron-right"></i>
      </span>

      <span class="zoom-btn" onclick="toggleZoom()">
        <i id="zoom-icon" class="fa-solid fa-magnifying-glass-plus"></i>
      </span>
    </div>

    <script src="script.js"></script>
  </body>
</html>

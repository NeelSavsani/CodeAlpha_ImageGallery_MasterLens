<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MasterLens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="header.css" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/e05d24f6c7.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <img src="assets/MasterEagle.png" alt="Logo" />MasterLens
      </div>
      <ul class="actions">
        <li><a href="https://neelsavsani.vercel.app/" target="_blank"><i class="fa-solid fa-circle-user"></i> PortFolio</a></li>
        <li><i class="fa-solid fa-sun" onclick="toggleTheme(event)" title="Toggle Theme"></i></li>
        <li><a href="https://www.linkedin.com/in/neel-savsani" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a></li>
        <li><a href="neelsavsani7@google.com" target="_blank"><i class="fa-solid fa-envelope"></i></a></li>
        <li><a href="https://github.com/NeelSavsani" target="_blank"><i class="fa-brands fa-github"></i></a></li>
      </ul>
    </header>

    <div class="gallery"></div>

    <!-- FULLSCREEN PREVIEW -->
    <div id="preview">
      <span class="close" onclick="closeImage()">
        <i class="fa-solid fa-xmark"></i>
      </span>

      <span class="nav left" onclick="prevImage()">
        <i class="fa-solid fa-chevron-left"></i>
      </span>

      <div class="image-container">
        <img id="preview-img" />
      </div>

      <span class="nav right" onclick="nextImage()">
        <i class="fa-solid fa-chevron-right"></i>
      </span>

      <span class="zoom-btn" onclick="toggleZoom()">
        <i id="zoom-icon" class="fa-solid fa-magnifying-glass-plus"></i>
      </span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
